<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Founder Workflow Audit — Intake Questionnaire</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #0f0f0f; color: #f5f5f5; line-height: 1.6; padding: 2rem; }
        .container { max-width: 640px; margin: 0 auto; }
        h1 { font-size: 1.75rem; margin-bottom: 0.5rem; }
        .subtitle { color: #888; margin-bottom: 2rem; }
        .field { margin-bottom: 1.5rem; }
        label { display: block; margin-bottom: 0.5rem; font-weight: 500; }
        input, textarea, select { width: 100%; padding: 0.75rem; background: #1a1a1a; border: 1px solid #333; border-radius: 6px; color: #fff; font-size: 1rem; }
        textarea { min-height: 100px; resize: vertical; }
        .checkbox-group label { display: flex; align-items: center; gap: 0.5rem; font-weight: 400; }
        input[type="checkbox"] { width: auto; }
        button { background: #ff6b35; color: #fff; border: none; padding: 1rem 2rem; font-size: 1rem; font-weight: 600; border-radius: 6px; cursor: pointer; width: 100%; }
        button:hover { background: #ff8555; }
        .note { font-size: 0.875rem; color: #666; margin-top: 1rem; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Workflow Audit Intake</h1>
        <p class="subtitle">Tell me about the work draining your week.</p>
        
        <form action="https://formspree.io/f/mpwzgvjq" method="POST">
            <div class="field">
                <label for="name">Your name</label>
                <input type="text" id="name" name="name" required>
            </div>
            
            <div class="field">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" required>
            </div>
            
            <div class="field">
                <label for="company">Company / project name</label>
                <input type="text" id="company" name="company">
            </div>
            
            <div class="field">
                <label for="role">Your role</label>
                <select id="role" name="role">
                    <option value="">Select...</option>
                    <option value="solo-founder">Solo founder</option>
                    <option value="2-5 team">2–5 person team</option>
                    <option value="6-20 team">6–20 person team</option>
                    <option value="operator">Operator / VA</option>
                </select>
            </div>
            
            <div class="field">
                <label for="weekly-work">What recurring work eats 3+ hours this week?</label>
                <textarea id="weekly-work" name="weekly-work" placeholder="e.g., cleaning up HubSpot exports, drafting weekly updates, triaging support emails..." required></textarea>
            </div>
            
            <div class="field">
                <label>How do you handle this now?</label>
                <div class="checkbox-group">
                    <label><input type="checkbox" name="how-handle" value="manually"> I do it manually</label>
                    <label><input type="checkbox" name="how-handle" value="templates"> Using templates / prompts</label>
                    <label><input type="checkbox" name="how-handle" value="automation"> Some automation (Zapier, Make, etc.)</label>
                    <label><input type="checkbox" name="how-handle" value="ai-prompts"> AI prompts / ChatGPT</label>
                    <label><input type="checkbox" name="how-handle" value="va"> Handed to VA / team</label>
                </div>
            </div>
            
            <div class="field">
                <label for="pain">What's the worst part of this workflow?</label>
                <textarea id="pain" name="pain" placeholder="e.g., inconsistent outputs, takes too long, never trust the results..." required></textarea>
            </div>
            
            <div class="field">
                <label for="attempted">What have you already tried?</label>
                <textarea id="attempted" name="attempted" placeholder="Tools, prompts, automations you've tested..."></textarea>
            </div>
            
            <div class="field">
                <label for="tools">Your current stack</label>
                <textarea id="tools" name="tools" placeholder="CRMs, automation tools, AI tools you use..."></textarea>
            </div>
            
            <div class="field">
                <label for="budget">Time/money you've spent on AI/automation in the last 90 days</label>
                <input type="text" id="budget" name="budget" placeholder="e.g., $500 on tools, ~20 hours of experimenting...">
            </div>
            
            <button type="submit">Submit for Audit</button>
            
            <p class="note">After purchase, you'll receive a confirmation email with next steps.</p>
        </form>
    </div>
</body>
</html>
